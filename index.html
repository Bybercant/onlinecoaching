<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkant Yenel | Online Fitness</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; line-height: 1.6; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.9rem; font-weight: bold; cursor: pointer; }
        .btn-hero { background-color: #ccff00; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; cursor: pointer; border: none; transition: 0.3s; }
        .btn-hero:hover { opacity: 0.8; }

        .hero { display: flex; align-items: center; justify-content: space-between; padding: 100px 50px; }
        .hero-content { max-width: 50%; }
        h1 { font-size: 4rem; margin-bottom: 20px; }
        .hero-image { width: 400px; height: 500px; background: #222; display: flex; align-items: center; justify-content: center; border: 2px solid #ccff00; border-radius: 20px; color: #666; }

        /* Programlar Alanı */
        .programs-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 2000; overflow-y: auto; padding: 50px; }
        .section-title { text-align: center; margin-bottom: 50px; font-size: 3rem; color: #ccff00; }
        .paket-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .paket-card { background: #111; padding: 30px; border-radius: 15px; width: 350px; border: 1px solid #333; text-align: center; }
        .program-text { font-size: 0.85rem; color: #ccc; text-align: left; margin: 20px 0; min-height: 250px; white-space: pre-wrap; transition: 0.5s; }
        
        .locked-content { filter: blur(8px); user-select: none; }
        .unlocked { filter: blur(0px); }

        /* Footer */
        footer { padding: 50px; background: #050505; display: flex; justify-content: space-between; align-items: flex-start; border-top: 1px solid #333; margin-top: 50px; }
        .footer-left h2 { color: #ccff00; font-size: 2rem; }
        .footer-kurumsal { display: flex; flex-direction: column; gap: 10px; text-align: right; }
        .footer-kurumsal a { color: #aaa; text-decoration: none; transition: 0.3s; }
        .footer-kurumsal a:hover { color: #ccff00; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #ccff00; width: 400px; max-height: 80%; overflow-y: auto; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }

        .social-container { display: inline-block; text-align: center; margin-top: 20px; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .social-icon { width: 40px; height: 40px; fill: white; transition: 0.3s; }
        .social-icon:hover { fill: #ccff00; }

        @media (max-width: 768px) { .hero { flex-direction: column; text-align: center; } .hero-content { max-width: 100%; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">BERKANT YENEL</div>
        <ul class="nav-links">
            <li><a href="#about">HAKKIMDA</a></li>
            <li><a onclick="openPrograms()">PROGRAMLAR</a></li>
            <li><a href="mailto:yenelberkant@gmail.com">İLETİŞİM</a></li>
        </ul>
        <button class="btn-hero" onclick="openLogin()">HEMEN BAŞLA</button>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>HEDEF DEĞİL SİSTEM</h1>
                <p>Türkiye'nin önde gelen online fitness koçluk platformu.</p>
                <button class="btn-hero" onclick="openLogin()">HEMEN BAŞLA</button>
            </div>
            <div class="hero-image">FOTOĞRAFIN</div>
        </section>

        <section id="about" style="padding: 80px 50px; text-align: center;">
            <h2 style="font-size: 3rem; margin-bottom: 20px; color: #ccff00;">HAKKIMDA</h2>
            <p style="max-width: 800px; margin: 0 auto; font-size: 1.2rem;">Kişisel antrenörlük ve fitness koçluğunda, hedeflerine ulaşman için buradayım.</p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 50px auto; width: 50%;">
