<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkant Yenel | Personal Trainer</title>
    <style>
        /* Arka plan hareketli renk geçişi (Wavy Effect) */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            
            /* Renk geçişi ve animasyon ayarları */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
            text-align: left;
            background: rgba(0, 0, 0, 0.3); /* Yazıların okunması için hafif şeffaf kutu */
            border-radius: 20px;
            backdrop-filter: blur(10px); /* Modern cam efekti */
        }

        h1 { font-size: 4rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -2px; line-height: 1; }
        .bio { font-size: 1.2rem; color: #ffffff; margin-bottom: 40px; line-height: 1.5; opacity: 0.9; }
        
        .menu-list { list-style: none; padding: 0; }
        .menu-list li { margin-bottom: 15px; }
        .menu-list a { 
            color: #ffffff; 
            text-decoration: none; 
            font-size: 1.5rem; 
            font-weight: 500;
            transition: 0.3s;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }
        .menu-list a:hover { opacity: 0.7; border-bottom: 2px solid #ffffff; }

        @media (max-width: 600px) { h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>BERKANT YENEL</h1>
        <p class="bio">Personal Trainer & Fitness Coach.<br>Transforming lives through movement and discipline.</p>

        <ul class="menu-list">
            <li><a href="#">Çalışalım</a></li>
            <li><a href="#">Antrenman Programları</a></li>
            <li><a href="#">Instagram</a></li>
            <li><a href="#">YouTube</a></li>
        </ul>
    </div>

</body>
</html>
