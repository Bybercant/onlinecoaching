<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkant Yenel | Online Fitness</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; }

        /* Navbar & Hero */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; }
        .hero { display: flex; align-items: center; justify-content: space-between; padding: 100px 50px; }
        h1 { font-size: 4rem; margin-bottom: 20px; }
        .btn-hero { background-color: #ccff00; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; cursor: pointer; border: none; }

        /* Kilitli İçerik */
        .locked-content { filter: blur(10px); pointer-events: none; transition: 0.5s; }
        .unlocked { filter: blur(0px); pointer-events: auto; }

        /* Giriş Penceresi (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 30px; border-radius: 10px; text-align: center; }
        input { padding: 10px; margin: 10px 0; width: 100%; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">BERKANT YENEL</div>
        <button class="btn-hero" onclick="openLogin()">HEMEN BAŞLA</button>
    </nav>

    <main>
        <section class="hero">
            <div>
                <h1>HEDEF DEĞİL SİSTEM</h1>
                <p>Kişiselleştirilmiş programlar için giriş yap.</p>
            </div>
        </section>

        <!-- KİLİTLİ BÖLÜM -->
        <section id="akademi" class="locked-content" style="padding: 50px;">
            <h2>EGZERSİZ AKADEMİSİ (ÖZEL İÇERİK)</h2>
            <p>Burada antrenman videoların ve özel programların yer alıyor.</p>
        </section>
    </main>

    <!-- GİRİŞ MODALI -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>Üye Girişi</h3>
            <input type="password" id="passInput" placeholder="Parolayı girin">
            <button class="btn-hero" onclick="checkPassword()">GİRİŞ YAP</button>
            <button onclick="closeLogin()" style="background:none; color:white; border:none; margin-top:10px;">Kapat</button>
        </div>
    </div>

    <script>
        // BURADAN PAROLAYI DEĞİŞTİREBİLİRSİN
        const SIFRE = "123456"; 

        function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

        function checkPassword() {
            let input = document.getElementById('passInput').value;
            if (input === SIFRE) {
                document.getElementById('akademi').classList.add('unlocked');
                localStorage.setItem('isLoggedIn', 'true'); // Giriş yapmış say
                closeLogin();
                alert("Hoş geldin şampiyon!");
            } else {
                alert("Hatalı parola!");
            }
        }

        // Sayfa yenilenince girişin kalıcı olması için
        window.onload = function() {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('akademi').classList.add('unlocked');
            }
        }
    </script>
</body>
</html>
